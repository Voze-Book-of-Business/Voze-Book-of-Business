function fmt$(n){ return '$' + n.toLocaleString(); }

function roleBreakdownHtml(roles) {
  if (!roles || typeof roles !== 'object') return '';
  const entries = Object.entries(roles).filter(([k,v]) => v > 0);
  if (entries.length === 0) return '';
  const total = entries.reduce((s,[,v]) => s + v, 0);
  const classMap = {"Truck Sales":"rp-truck","Parts":"rp-parts","Service":"rp-service","Managers":"rp-managers","Trailer Sales":"rp-trailer","Inside Sales":"rp-inside"};
  const pills = entries.map(([k,v]) => `<span class="role-pill ${classMap[k]||''}">${k} <span class="rp-count">${v}</span></span>`).join('');
  return `<div class="role-breakdown"><div class="rb-title">Adoption by Role <span class="rb-total">${total} users</span></div>${pills}</div>`;
}

function daysToRenewal(dateStr) {
  if (!dateStr || dateStr === '---') return '';
  const rd = parseRenewalDate(dateStr);
  if (!rd) return '';
  const now = new Date();
  const diff = Math.ceil((rd - now) / (1000*60*60*24));
  if (diff < 0) return `<span class="days-renewal dr-urgent">Expired ${Math.abs(diff)}d ago</span>`;
  if (diff <= 90) return `<span class="days-renewal dr-urgent">${diff} days</span>`;
  if (diff <= 180) return `<span class="days-renewal dr-soon">${diff} days</span>`;
  return `<span class="days-renewal dr-ok">${diff} days</span>`;
}

function arpuTag(arr, roles) {
  if (!roles || !arr) return '';
  const total = Object.values(roles).reduce((s,v) => s + v, 0);
  if (total === 0) return '';
  const arpu = Math.round(arr / total);
  return `<span class="arpu-tag">${fmt$(arpu)}/user</span>`;
}

function npsClass(score) {
  if (score === null || score === undefined) return '';
  if (score >= 9) return 'nps-green has-score';
  if (score >= 7) return 'nps-yellow has-score';
  return 'nps-red has-score';
}

function repClass(rep) {
  if (!rep) return '';
  if (rep.includes('Jesse')) return 'jesse';
  if (rep.includes('Myles')) return 'myles';
  return '';
}

function renderStats() {
  const current = customers.filter(c => c.category === 'Current');
  const onboarding = customers.filter(c => c.category === 'Onboarding');
  const pilot = customers.filter(c => c.category === 'Pilot');
  const activeArr = current.reduce((s,c) => s + c.arr, 0);
  const totalExpansion = current.reduce((s,c) => s + (c.ytdExpansion || 0), 0);
  const onboardingArr = onboarding.reduce((s,c) => s + c.arr, 0);
  const pilotArr = pilot.reduce((s,c) => s + (c.arr || 0), 0);
  const totalArr = activeArr + onboardingArr + pilotArr;
  const green = current.filter(c => c.status === 'Green').length;
  const yellow = current.filter(c => c.status === 'Yellow').length;
  const red = current.filter(c => c.status === 'Red').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="v">${current.length}</div><div class="l">Current Customers</div></div>
    <div class="stat"><div class="v">${fmt$(totalArr)}</div><div class="l">Total ARR</div></div>
    <div class="stat"><div class="v">${fmt$(onboardingArr)}</div><div class="l">Onboarding ARR (${onboarding.length})</div></div>
    <div class="stat"><div class="v">${pilot.length > 0 && pilot[0].potentialArr ? pilot[0].potentialArr : fmt$(pilotArr)}</div><div class="l">Piloting ARR (${pilot.length})</div></div>
    <div class="stat"><div class="v" style="color:${totalExpansion >= 0 ? '#059669' : '#DC2626'}">${totalExpansion >= 0 ? '+' : '-'}${fmt$(Math.abs(totalExpansion))}</div><div class="l">YTD Expansion</div></div>
    <div class="stat"><div class="v" style="color:#10B981">${green}</div><div class="l">Green</div></div>
    <div class="stat"><div class="v" style="color:#F59E0B">${yellow}</div><div class="l">Yellow</div></div>
    <div class="stat"><div class="v" style="color:#EF4444">${red}</div><div class="l">Red</div></div>
  `;
  document.getElementById('account-count').textContent = customers.length;
}

function parseRenewalDate(str) {
  if (!str || str === '---') return null;
  const parts = str.split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[0]) - 1, parseInt(parts[1]));
}

function filterList() {
  const search = document.getElementById('search').value.toLowerCase();
  const categoryF = document.getElementById('categoryFilter').value;
  const statusF = document.getElementById('statusFilter').value;
  const repF = document.getElementById('repFilter').value;
  const renewalF = document.getElementById('renewalFilter').value;
  const sortBy = document.getElementById('sortBy').value;
  const now = new Date(); const thisYear = now.getFullYear(); const thisMonth = now.getMonth();

  let list = customers.filter(c => {
    if (search && !c.name.toLowerCase().includes(search) && !(c.contact||'').toLowerCase().includes(search)) return false;
    if (categoryF !== 'all' && c.category !== categoryF) return false;
    if (statusF !== 'all' && c.status !== statusF) return false;
    if (repF !== 'all' && c.rep !== repF) return false;
    if (renewalF !== 'all') {
      const rd = parseRenewalDate(c.renewal);
      if (!rd) return false;
      if (renewalF === 'thisMonth') { if (rd.getFullYear() !== thisYear || rd.getMonth() !== thisMonth) return false; }
      else if (renewalF === 'nextMonth') { const nm=new Date(thisYear,thisMonth+1,1); if (rd.getFullYear()!==nm.getFullYear()||rd.getMonth()!==nm.getMonth()) return false; }
      else if (renewalF === 'quarter') { const qe=new Date(thisYear,thisMonth+3,now.getDate()); if (rd<now||rd>qe) return false; }
      else if (renewalF === '6months') { const se=new Date(thisYear,thisMonth+6,now.getDate()); if (rd<now||rd>se) return false; }
    }
    return true;
  });

  if (sortBy === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sortBy === 'status') list.sort((a,b) => ({Red:0,Yellow:1,Green:2})[a.status] - ({Red:0,Yellow:1,Green:2})[b.status]);
  else if (sortBy === 'renewal') list.sort((a,b) => { const da=parseRenewalDate(a.renewal),db=parseRenewalDate(b.renewal); if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1; return da-db; });
  return list;
}

function renderSections() {
  const list = filterList();
  const currentItems = list.filter(c => c.category === 'Current');
  const onboardingItems = list.filter(c => c.category === 'Onboarding');
  const pilotItems = list.filter(c => c.category === 'Pilot');
  const container = document.getElementById('sections-container');
  let html = '';

  if (currentItems.length > 0) {
    html += `<div class="section-divider sd-current"><h2>Current Customers</h2><div class="section-sub">${currentItems.length} active accounts</div></div>`;
    html += `<div class="grid">${currentItems.map(c => renderCurrentCard(c)).join('')}</div>`;
  }
  if (onboardingItems.length > 0) {
    html += `<div class="section-divider sd-onboarding"><h2>Onboarding</h2><div class="section-sub">${onboardingItems.length} account${onboardingItems.length>1?'s':''} in onboarding</div></div>`;
    html += `<div class="grid">${onboardingItems.map(c => renderOnboardingCard(c)).join('')}</div>`;
  }
  if (pilotItems.length > 0) {
    html += `<div class="section-divider sd-pilot"><h2>Pilot</h2><div class="section-sub">${pilotItems.length} active pilot${pilotItems.length>1?'s':''}</div></div>`;
    html += `<div class="grid">${pilotItems.map(c => renderPilotCard(c)).join('')}</div>`;
  }
  if (list.length === 0) html = '<div style="padding:60px 40px;text-align:center;color:#94A3B8;font-size:16px;">No customers match the current filters.</div>';
  container.innerHTML = html;
}

function getFileType(h){if(h.endsWith('.docx'))return'Word Document';if(h.endsWith('.pptx'))return'PowerPoint Presentation';if(h.endsWith('.xlsx'))return'Excel Spreadsheet';return'Document';}

function openDocModal(href,label){
  modalOverlay.innerHTML=`<div class="modal-panel"><div class="file-icon">${getFileIcon(href)}</div><h3>${href.split('/').pop()}</h3><div class="file-type">${getFileType(href)}</div><p style="color:#64748B;font-size:13px;margin-bottom:16px">This document cannot be previewed in-browser. Click below to open it.</p><div class="modal-actions"><button class="btn-modal primary" onclick="window.open('${href}','_blank')">Open Document</button><button class="btn-modal" onclick="closeDocModal()">Close</button></div></div>`;
  modalOverlay.classList.add('active');
}
function closeDocModal(){modalOverlay.classList.remove('active');}
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeDocModal();});

document.addEventListener('click',e=>{
  if(e.target.tagName==='A'){const h=e.target.getAttribute('href');if(h&&(h.endsWith('.docx')||h.endsWith('.pptx')||h.endsWith('.xlsx'))){e.preventDefault();openDocModal(h,e.target.textContent);}}
},true);

function openReportsModal(customerName){
  const reports=customerReports[customerName];if(!reports)return;
  function ri(f){if(f.endsWith('.pdf')||f.includes('drive.google.com'))return'📕';if(f.endsWith('.pptx')||f.includes('docs.google.com/presentation'))return'📊';if(f.endsWith('.xlsx')||f.includes('docs.google.com/spreadsheets'))return'📗';return'📁';}
  function rt(f){if(f.endsWith('.pdf')||f.includes('drive.google.com'))return'PDF';if(f.endsWith('.pptx')||f.includes('docs.google.com/presentation'))return'PPTX';if(f.endsWith('.xlsx')||f.includes('docs.google.com/spreadsheets'))return'XLSX';return'File';}
  const items=reports.map((r,i)=>`<li onclick="toggleReportCheck(${i})" id="report-item-${i}"><input type="checkbox" id="report-cb-${i}" onclick="event.stopPropagation();toggleReportCheck(${i})"><span style="font-size:20px;">${ri(r.file)}</span><span class="report-name">${r.name}</span><span class="report-type">${rt(r.file)}</span></li>`).join('');
  modalOverlay.innerHTML=`<div class="modal-panel" style="max-width:600px;"><h3 style="margin-bottom:4px;">${customerName} — Reports</h3><div style="font-size:13px;color:#64748B;margin-bottom:12px;">${reports.length} report${reports.length!==1?'s':''} available</div><ul class="report-list">${items}</ul><div style="display:flex;gap:8px;justify-content:space-between;align-items:center;"><span style="font-size:13px;color:#94A3B8;" id="reports-selected-count">0 selected</span><div style="display:flex;gap:10px;"><button class="btn-modal" onclick="selectAllReports(${reports.length})">Select All</button><button class="btn-modal primary" onclick="openSelectedReports('${customerName.replace(/'/g,"\\'")}')">Open Selected</button><button class="btn-modal" onclick="closeDocModal()">Close</button></div></div></div>`;
  modalOverlay.classList.add('active');
}
function toggleReportCheck(i){const cb=document.getElementById('report-cb-'+i);const li=document.getElementById('report-item-'+i);cb.checked=!cb.checked;li.classList.toggle('selected',cb.checked);updateSelectedCount();}
function selectAllReports(n){for(let i=0;i<n;i++){document.getElementById('report-cb-'+i).checked=true;document.getElementById('report-item-'+i).classList.add('selected');}updateSelectedCount();}
function updateSelectedCount(){const n=document.querySelectorAll('.report-list input[type="checkbox"]:checked').length;const el=document.getElementById('reports-selected-count');if(el)el.textContent=n+' selected';}
function openSelectedReports(name){const reps=customerReports[name];if(!reps)return;const sel=[];reps.forEach((r,i)=>{if(document.getElementById('report-cb-'+i)?.checked)sel.push(r.file);});if(!sel.length){alert('Please select at least one report.');return;}sel.forEach(f=>window.open(f,'_blank'));closeDocModal();}
</script>
</body>
</html>
