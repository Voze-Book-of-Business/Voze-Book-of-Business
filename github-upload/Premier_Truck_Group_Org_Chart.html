<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Truck Group - Org Chart & Engagement Scorecard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #D5DAE1;
            color: #1E293B;
            line-height: 1.5;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HERO SECTION */
        .hero {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #E2E8F0;
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
            padding: 30px 20px;
            margin: -20px -20px 40px -20px;
            border-radius: 0;
        }

        .hero-content {
            display: block;
        }

        .hero-left {
            width: 100%;
        }

        .hero-right {
            display: none;
        }

        /* map is now Leaflet-powered div */

        .logo {
            font-size: 48px;
            font-weight: 700;
            color: #F59E0B;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 18px;
            color: #E2E8F0;
            margin-bottom: 30px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 15px;
        }

        .stat-item {
            background-color: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 15px;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748B;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #F59E0B;
        }

        .data-date {
            font-size: 13px;
            color: #E2E8F0;
            margin-top: 5px;
        }

        /* SVG MAP STYLING */
        .hero-map-svg {
            width: 100%;
            height: 400px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }

        /* FILTER SECTION */
        .filter-section {
            background-color: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
        }

        .filter-row:last-child {
            margin-bottom: 0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748B;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        select {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            color: #1E293B;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="text"]::placeholder {
            color: #94A3B8;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #F59E0B;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid #E2E8F0;
            background-color: #FFFFFF;
            color: #1E293B;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: #F59E0B;
            color: #F59E0B;
        }

        .btn-primary {
            background-color: #F59E0B;
            border-color: #F59E0B;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: #D97706;
            border-color: #D97706;
        }

        /* SECTION HEADERS */
        .section-header {
            font-size: 20px;
            font-weight: 700;
            color: #1E293B;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #E2E8F0;
        }

        /* CARD CONTAINER GRIDS */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-container.ceo-level {
            grid-template-columns: 1fr;
            margin-bottom: 40px;
        }

        .card-container.evp-level {
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            margin-bottom: 40px;
        }

        .card-container.directors-level {
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            margin-bottom: 40px;
        }

        .card-container.location-cards {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        /* PERSONNEL CARD */
        .card {
            background-color: #FFFFFF;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 4px solid #F59E0B;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .card:hover {
            border-color: #CBD5E1;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .card.champion {
            border-left-color: #10B981;
            border-right-color: #10B981;
            border-top-color: #10B981;
            border-bottom-color: #10B981;
        }

        .card.neutral {
            border-left-color: #F59E0B;
            border-right-color: #334155;
            border-top-color: #334155;
            border-bottom-color: #334155;
        }

        .card.detractor {
            border-left-color: #F472B6;
            border-right-color: #F472B6;
            border-top-color: #F472B6;
            border-bottom-color: #F472B6;
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .card-location-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .dealer-photo {
            width: 300px;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #E2E8F0;
        }

        .dealer-location-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dealer-location-name {
            font-weight: 700;
            font-size: 22px;
            color: #1E293B;
            margin-bottom: 4px;
        }

        .dealer-page-link {
            font-size: 15px;
            color: #06B6D4;
            text-decoration: none;
            font-weight: 500;
        }

        .dealer-page-link:hover {
            text-decoration: underline;
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            flex-shrink: 0;
        }

        /* Avatar colors by role */
        .avatar.ceo {
            background-color: #F59E0B;
            color: #0F172A;
        }

        .avatar.evp {
            background-color: #3B82F6;
            color: #FFF;
        }

        .avatar.director {
            background-color: #8B5CF6;
            color: #FFF;
        }

        .avatar.gm {
            background-color: #10B981;
            color: #FFF;
        }

        .avatar.pm {
            background-color: #06B6D4;
            color: #FFF;
        }

        .avatar.asm {
            background-color: #F472B6;
            color: #FFF;
        }

        .avatar.ic {
            background-color: #A78BFA;
            color: #FFF;
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-weight: 700;
            font-size: 19px;
            color: #1E293B;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 15px;
            color: #64748B;
            margin-bottom: 4px;
        }

        .card-phone {
            font-size: 14px;
            color: #64748B;
            margin-top: 2px;
        }

        .card-email {
            font-size: 14px;
            color: #64748B;
            word-break: break-all;
        }

        .card-linkedin {
            font-size: 13px;
            margin-top: 3px;
        }

        .card-linkedin a {
            color: #0A66C2;
            text-decoration: none;
            font-weight: 600;
        }

        .card-linkedin a:hover {
            text-decoration: underline;
        }

        .card-body {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #E2E8F0;
        }

        .active-product-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .active-product-label {
            font-size: 13px;
            text-transform: uppercase;
            color: #64748B;
            min-width: 100px;
        }

        .active-product-bar-visual {
            flex: 1;
            height: 8px;
            background-color: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
        }

        .active-product-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #06B6D4, #3B82F6);
            border-radius: 3px;
        }

        .active-product-count {
            font-size: 14px;
            color: #1E293B;
            font-weight: 600;
            min-width: 30px;
            text-align: right;
        }

        .survey-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #E2E8F0;
        }
        .survey-section-label {
            font-size: 11px;
            font-weight: 700;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .org-survey-q {
            width: 100%;
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 12px;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            color: #1E293B;
            background: #F8FAFC;
            margin-bottom: 6px;
        }
        .org-survey-q:focus {
            outline: none;
            border-color: #F59E0B;
            box-shadow: 0 0 0 2px rgba(245,158,11,0.1);
        }
        .org-survey-q::placeholder {
            color: #94A3B8;
            font-style: italic;
        }
        .org-survey-label {
            font-size: 10px;
            color: #64748B;
            margin-bottom: 2px;
            display: block;
        }

        .stance-dropdown {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #E2E8F0;
            background-color: #F8FAFC;
            color: #1E293B;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .stance-dropdown:focus {
            outline: none;
            border-color: #F59E0B;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.1);
        }

        .stance-dropdown.champion {
            color: #10B981;
            border-color: #10B981;
            background-color: rgba(16, 185, 129, 0.05);
        }

        .stance-dropdown.neutral {
            color: #F59E0B;
            border-color: #F59E0B;
            background-color: rgba(245, 158, 11, 0.05);
        }

        .stance-dropdown.detractor {
            color: #F472B6;
            border-color: #F472B6;
            background-color: rgba(244, 114, 182, 0.05);
        }

        .csm-communication {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748B;
            margin-bottom: 10px;
            padding: 8px 10px;
            background-color: #F8FAFC;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
        }

        .csm-label {
            text-transform: uppercase;
            font-weight: 600;
            min-width: 115px;
        }

        .csm-indicator {
            font-weight: 600;
            color: #64748B;
        }

        .csm-indicator.yes {
            color: #10B981;
        }

        .engagement-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background-color: #F8FAFC;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
        }

        .engagement-label {
            font-size: 13px;
            text-transform: uppercase;
            color: #64748B;
            font-weight: 600;
        }

        .engagement-badge {
            font-size: 16px;
            font-weight: 700;
            color: #F59E0B;
        }

        /* LOCATION SECTION */
        .location-block {
            margin-bottom: 40px;
            padding: 24px;
            background-color: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            border-top: 3px solid #F59E0B;
        }

        .location-header {
            font-size: 18px;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #E2E8F0;
        }

        /* TABS */
        .tabs-container {
            margin-bottom: 30px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #E2E8F0;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #64748B;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #F59E0B;
        }

        .tab-btn.active {
            color: #F59E0B;
            border-bottom-color: #F59E0B;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        /* EXPORT BUTTON */
        .export-section {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #E2E8F0;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .hero-content {
                display: block;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .filter-row {
                grid-template-columns: 1fr;
            }

            .card-container {
                grid-template-columns: 1fr;
            }

            .card-container.evp-level,
            .card-container.directors-level {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 32px;
            }
        }

        /* STRUCTURAL */
        .hide-on-filter {
            display: block;
        }

        .hide-on-filter.hidden {
            display: none;
        }

        /* LEAFLET MAP */
        #ptg-map {
            background-color: #FFFFFF;
        }
        .leaflet-popup-content-wrapper {
            background: #FFFFFF;
            color: #1E293B;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }
        .leaflet-popup-tip {
            background: #FFFFFF;
        }
        .leaflet-popup-content {
            margin: 10px 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .ptg-marker {
            background: #DC2626;
            border: 2px solid #000;
            border-radius: 50%;
            width: 12px;
            height: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HERO SECTION -->
        <div class="hero">
            <div class="logo">PREMIER TRUCK GROUP</div>
            <div class="subtitle">Leadership Org Chart & Engagement Scorecard</div>

            <div id="ptg-map" style="width:100%; height:500px; border-radius:12px; border:1px solid #E2E8F0; z-index:1; margin-bottom:20px;"></div>

            <div class="stats-bar" style="grid-template-columns: repeat(4, 1fr);">
                <div class="stat-item">
                    <div class="stat-label">Total Personnel</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Active in Product</div>
                    <div class="stat-value" id="stat-active">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Champions</div>
                    <div class="stat-value" id="stat-champions">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Detractors</div>
                    <div class="stat-value" id="stat-detractors">0</div>
                </div>
            </div>
            <div class="data-date">Engagement Data: Mar 16 – Apr 19, 2026</div>
        </div>

        <!-- FILTER SECTION -->
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label class="filter-label">Search by Name/Title/Location</label>
                    <input type="text" id="search-input" placeholder="Start typing...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Region</label>
                    <select id="region-filter">
                        <option value="">All Regions</option>
                        <option value="Corporate">Corporate</option>
                        <option value="East">East</option>
                        <option value="West">West</option>
                        <option value="North">North</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Leadership Sentiment</label>
                    <select id="stance-filter">
                        <option value="">All Sentiments</option>
                        <option value="champion">Champion</option>
                        <option value="neutral">Neutral</option>
                        <option value="detractor">Detractor</option>
                        <option value="unset">Unset</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label class="filter-label">Active in Product</label>
                    <select id="active-filter">
                        <option value="">All Users</option>
                        <option value="active">Active (>0 comments)</option>
                        <option value="inactive">Inactive (0 comments)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Actions</label>
                    <div class="button-group">
                        <button class="btn" id="clear-filters">Clear Filters</button>
                        <button class="btn btn-primary" id="export-btn">Export CSV</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CORPORATE LEADERSHIP -->
        <div class="corporate-section hide-on-filter" id="corporate-section">
            <div class="section-header">President & CEO</div>
            <div class="card-container ceo-level" id="ceo-container"></div>

            <div class="section-header">Executive Vice Presidents</div>
            <div class="card-container evp-level" id="evp-container"></div>

            <div class="section-header">Directors</div>
            <div class="card-container directors-level" id="directors-container"></div>
        </div>

        <!-- REGIONAL TABS -->
        <div class="tabs-container hide-on-filter" id="tabs-container">
            <div class="section-header">Regional Leadership</div>
            <div class="tab-buttons" id="tab-buttons"></div>
            <div id="tab-contents"></div>
        </div>
    </div>

    <!-- EXPORT SECTION -->
    <div class="container">
        <div class="export-section hide-on-filter">
            <button class="btn btn-primary" id="export-btn-footer">Export All Personnel to CSV</button>
        </div>
    </div>

        function getRoleColor(role) {
            const roleType = role.split(' ')[0].toUpperCase();
            return roleColorMap[roleType] || 'pm';
        }

        function getVozeComments(name) {
            return vozeComments[name] || 0;
        }

        function calculateEngagementScore(comments) {
            let score = Math.min(comments * 2, 100);
            return Math.max(0, Math.min(100, Math.round(score)));
        }

        function createPersonCard(person) {
            const comments = getVozeComments(person.name);
            const stance = stanceData[person.name] || 'neutral';
            const score = calculateEngagementScore(comments);
            const roleColor = getRoleColor(person.role);
            const initials = getInitials(person.name);
            const csmStatus = csmData[person.name] || false;
            const phone = phoneNumbers[person.name] || '';
            const linkedin = linkedinProfiles[person.name] || '';

            const card = document.createElement('div');
            card.className = `card ${stance !== 'unset' ? stance : 'neutral'}`;
            card.dataset.name = person.name;
            card.dataset.title = person.title;
            card.dataset.location = person.location;
            card.dataset.region = person.region;
            card.dataset.voze = comments;
            card.dataset.stance = stance;
            card.dataset.score = score;

            let cardHTML = `
                <div class="card-header">
                    <div class="avatar ${roleColor}">${initials}</div>
                    <div class="card-info">
                        <div class="card-name">${person.name}</div>
                        <div class="card-title">${person.title}</div>
                        ${phone ? `<div class="card-phone"><a href="tel:${phone.replace(/[^+\d]/g,'')}" style="color:#64748B;text-decoration:none;">📞 ${phone}</a></div>` : ''}
                        ${person.email ? `<div class="card-email">${person.email}</div>` : ''}
                        ${linkedin ? `<div class="card-linkedin"><a href="${linkedin}" target="_blank" rel="noopener">🔗 LinkedIn Profile</a></div>` : ''}
                    </div>
                </div>
                <div class="card-body">
                    <div class="stance-section" style="margin-bottom:10px;">
                        <div class="engagement-label">Leadership Sentiment</div>
                        <select class="stance-dropdown ${stance}" data-person-name="${person.name}">
                            <option value="neutral" ${stance === 'neutral' ? 'selected' : ''}>Neutral</option>
                            <option value="champion" ${stance === 'champion' ? 'selected' : ''}>Champion</option>
                            <option value="detractor" ${stance === 'detractor' ? 'selected' : ''}>Detractor</option>
                        </select>
                    </div>
                    <div class="engagement-score" style="margin-bottom:10px;">
                        <div style="flex:1;">
                            <div class="engagement-label">Voze Product Engagement (30d)</div>
                            <div class="active-product-bar-visual" style="margin-top:6px;">
                                <div class="active-product-bar-fill" style="width: ${Math.min(comments / 5 * 100, 100)}%"></div>
                            </div>
                        </div>
                        <div style="text-align:center; min-width:50px;">
                            <div class="engagement-badge">${score}</div>
                            <div style="font-size:10px; color:#64748B;">${comments} acts</div>
                        </div>
                    </div>
                    <div class="csm-communication">
                        <div class="csm-label">CSM Communication (30d)</div>
                        <div class="csm-indicator ${csmStatus ? 'yes' : ''}">
                            ${csmStatus ? '✓ Meeting / Email' : '— None'}
                        </div>
                    </div>
                    <div class="survey-section">
                        <div class="survey-section-label">Voze Feedback Survey</div>
                        <span class="org-survey-label">Favorite thing about Voze?</span>
                        <textarea class="org-survey-q" data-person="${person.name}" data-q="q1" placeholder="Their answer..." onfocus="this.style.minHeight='40px'" onblur="updateOrgSurvey(this)">${(orgSurveyData[person.name]||{}).q1||''}</textarea>
                        <span class="org-survey-label">Most value for company?</span>
                        <textarea class="org-survey-q" data-person="${person.name}" data-q="q2" placeholder="Their answer..." onfocus="this.style.minHeight='40px'" onblur="updateOrgSurvey(this)">${(orgSurveyData[person.name]||{}).q2||''}</textarea>
                        <span class="org-survey-label">Would change about Voze?</span>
                        <textarea class="org-survey-q" data-person="${person.name}" data-q="q3" placeholder="Their answer..." onfocus="this.style.minHeight='40px'" onblur="updateOrgSurvey(this)">${(orgSurveyData[person.name]||{}).q3||''}</textarea>
                    </div>
                </div>
            `;

            card.innerHTML = cardHTML;

            // Add stance dropdown listener
            const dropdown = card.querySelector('.stance-dropdown');
            dropdown.addEventListener('change', (e) => {
                const newStance = e.target.value;
                stanceData[person.name] = newStance;
                saveStanceData();
                refreshCard(person.name);
                updateStats();
            });

            return card;
        }

        function refreshCard(name) {
            const person = allPersonnel.find(p => p.name === name);
            if (!person) return;

            const allCards = document.querySelectorAll(`[data-name="${name}"]`);
            allCards.forEach(oldCard => {
                const newCard = createPersonCard(person);
                oldCard.replaceWith(newCard);
            });
        }

        function initializeCards() {

            const ceo = allPersonnel.filter(p => p.role === 'CEO');
            const ceoContainer = document.getElementById('ceo-container');

            // EVPs
            const evps = allPersonnel.filter(p => p.role === 'EVP');

                                    <div style="text-align:center;">

                    } else {

                                    <div style="text-align:center;">
                                        <div style="font-size:13px; text-transform:uppercase; font-weight:700; color:#64748B; margin-bottom:4px;">Last Onsite</div>
                                        <div style="font-size:17px; font-weight:700; color:${dates.lastOnsite !== '—' ? '#10B981' : '#94A3B8'};">${dates.lastOnsite}</div>
                                    </div>
                                    <div style="text-align:center;">
                                        <div style="font-size:13px; text-transform:uppercase; font-weight:700; color:#64748B; margin-bottom:4px;">Last Training</div>
                                        <div style="font-size:17px; font-weight:700; color:${dates.lastTraining !== '—' ? '#3B82F6' : '#94A3B8'};">${dates.lastTraining}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    locationBlock.appendChild(locationHeader);

                    const cardContainer = document.createElement('div');
                    cardContainer.className = 'card-container location-cards';

                    const locationPersonnel = allPersonnel.filter(p => p.region === region && p.location === location);
                    locationPersonnel.forEach(person => {
                        cardContainer.appendChild(createPersonCard(person));
                    });

                    locationBlock.appendChild(cardContainer);
                    content.appendChild(locationBlock);
                });

                tabContents.appendChild(content);
            });
        }

        function getLocationsByRegion(region) {
            const locations = new Set();
            allPersonnel.forEach(p => {
                if (p.region === region && p.location !== 'Corporate') {
                    locations.add(p.location);
                }
            });
            return Array.from(locations).sort();
        }

        function switchTab(region) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${region}`).classList.add('active');
        }

        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', (e) => {
                currentSearchTerm = e.target.value.toLowerCase();
                applyFilters();
            });

            document.getElementById('region-filter').addEventListener('change', (e) => {
                currentRegionFilter = e.target.value;
                applyFilters();
            });

            document.getElementById('stance-filter').addEventListener('change', (e) => {
                currentStanceFilter = e.target.value;
                applyFilters();
            });

            document.getElementById('active-filter').addEventListener('change', (e) => {
                currentActiveFilter = e.target.value;
                applyFilters();
            });

            document.getElementById('clear-filters').addEventListener('click', () => {
                document.getElementById('search-input').value = '';
                document.getElementById('region-filter').value = '';
                document.getElementById('stance-filter').value = '';
                document.getElementById('active-filter').value = '';
                currentSearchTerm = '';
                currentRegionFilter = '';
                currentStanceFilter = '';
                currentActiveFilter = '';
                currentLocationFilter = '';
                applyFilters();
                if (typeof updateMarkerHighlight === 'function') updateMarkerHighlight();
            });

            document.getElementById('export-btn').addEventListener('click', exportToCSV);
            document.getElementById('export-btn-footer').addEventListener('click', exportToCSV);
        }

        function applyFilters() {
            const allCards = document.querySelectorAll('.card');

            allCards.forEach(card => {
                let show = true;

                const name = card.dataset.name;
                const title = card.dataset.title;
                const location = card.dataset.location;
                const region = card.dataset.region;
                const voze = parseInt(card.dataset.voze);
                const stance = card.dataset.stance;

                // Search filter
                if (currentSearchTerm) {
                    if (!name.toLowerCase().includes(currentSearchTerm) &&
                        !title.toLowerCase().includes(currentSearchTerm) &&
                        !location.toLowerCase().includes(currentSearchTerm)) {
                        show = false;
                    }
                }

                // Region filter
                if (currentRegionFilter && region !== currentRegionFilter) {
                    show = false;
                }

                // Stance filter
                if (currentStanceFilter) {
                    if (currentStanceFilter === 'unset' && stance !== 'unset') {
                        show = false;
                    } else if (currentStanceFilter !== 'unset' && stance !== currentStanceFilter) {
                        show = false;
                    }
                }

                // Active filter
                if (currentActiveFilter === 'active' && voze === 0) {
                    show = false;
                } else if (currentActiveFilter === 'inactive' && voze > 0) {
                    show = false;
                }

                // Location filter (handled at the block level, not card level)
                // Individual cards don't get hidden by location — the whole block does

                card.classList.toggle('hidden', !show);
            });

            // Show/hide location blocks based on map click filter
            const allLocationBlocks = document.querySelectorAll('.location-block');
            allLocationBlocks.forEach(block => {
                if (currentLocationFilter) {
                    const blockLocation = block.dataset.locationName || '';
                    const matches = blockLocation.includes(currentLocationFilter);
                    block.style.display = matches ? '' : 'none';
                } else {
                    block.style.display = '';
                }
            });

            // When a location is filtered from the map, switch to the right region tab
            if (currentLocationFilter) {
                const matchingLoc = ptgLocations.find(loc => loc.name === currentLocationFilter);
                if (matchingLoc) {
                    switchTab(matchingLoc.region);
                }
                // Hide corporate section when filtering by location
                const corporateSection = document.getElementById('corporate-section');
                if (corporateSection) corporateSection.style.display = 'none';
            } else {
                const corporateSection = document.getElementById('corporate-section');
                if (corporateSection) corporateSection.style.display = '';
            }

            // Show/hide corporate section and tabs for other filters
            if (currentSearchTerm || currentRegionFilter || currentStanceFilter || currentActiveFilter) {
                const corporateSection = document.getElementById('corporate-section');
                if (corporateSection) corporateSection.classList.remove('hide-on-filter');
            } else if (!currentLocationFilter) {
                const corporateSection = document.getElementById('corporate-section');
                if (corporateSection) corporateSection.classList.add('hide-on-filter');
                const tabsContainer = document.getElementById('tabs-container');
                if (tabsContainer) tabsContainer.classList.add('hide-on-filter');
            }

            updateStats();
        }

        function updateStats() {
            const visibleCards = document.querySelectorAll('.card:not(.hidden)');
            const totalPersonnel = allPersonnel.length;
            const activeCount = Array.from(visibleCards).filter(c => parseInt(c.dataset.voze) > 0).length;
            const champions = Array.from(visibleCards).filter(c => c.dataset.stance === 'champion').length;
            const detractors = Array.from(visibleCards).filter(c => c.dataset.stance === 'detractor').length;

            document.getElementById('stat-total').textContent = allPersonnel.length;
            document.getElementById('stat-active').textContent = allPersonnel.filter(p => getVozeComments(p.name) > 0).length;
            document.getElementById('stat-champions').textContent = Object.values(stanceData).filter(s => s === 'champion').length;
            document.getElementById('stat-detractors').textContent = Object.values(stanceData).filter(s => s === 'detractor').length;
        }

        function loadStanceData() {
            const saved = localStorage.getItem('ptg-stance-data');
            if (saved) {
                stanceData = JSON.parse(saved);
            } else {
                // Default everyone to neutral
                allPersonnel.forEach(p => {
                    stanceData[p.name] = 'neutral';
                });
                saveStanceData();
            }
        }

        function saveStanceData() {
            localStorage.setItem('ptg-stance-data', JSON.stringify(stanceData));
        }

        function loadCsmData() {
            // CSM Communication data pulled from Google Calendar meetings
            // and Gmail email threads (last 30 days as of April 17, 2026)
            csmData = {
                'Matt Tripp': true,       // Calendar + Email
                'Rob Greene': true,        // Calendar + Email
                'Jeff Gilmer': true,       // Calendar + Email
                'Darren Hunt': true,       // Email
                'Matthew Workman': true,   // Email
                'Rob Hollmann': true,      // Email
                'Jeremy Dean': true,       // Email
                'Chris Fjeldsted': true,   // Email
                'Jon Scott': true,         // Email
                'Patrick Johnson': true,   // Email
                'Brian Hargis': true,      // Email
                'Brent Fryer': true,       // Email
            };
        }

        function saveCsmData() {
            localStorage.setItem('ptg-csm-data', JSON.stringify(csmData));
        }

        function loadOrgSurveyData() {
            const saved = localStorage.getItem('ptg-org-survey');
            if (saved) {
                orgSurveyData = JSON.parse(saved);
            }
        }

        function saveOrgSurveyData() {
            localStorage.setItem('ptg-org-survey', JSON.stringify(orgSurveyData));
        }

        function updateOrgSurvey(el) {
            const name = el.dataset.person;
            const q = el.dataset.q;
            if (!orgSurveyData[name]) orgSurveyData[name] = {};
            orgSurveyData[name][q] = el.value;
            el.style.minHeight = '24px';
            saveOrgSurveyData();
        }

        function exportToCSV() {
            let csv = 'Name,Title,Email,Location,Region,Role,Active in Product,Stance,Engagement Score,CSM Communication,Favorite Thing About Voze,Most Value For Company,Would Change About Voze\n';

            allPersonnel.forEach(person => {
                const comments = getVozeComments(person.name);
                const stance = stanceData[person.name] || 'neutral';
                const score = calculateEngagementScore(comments);
                const csmStatus = csmData[person.name] ? 'Yes' : 'None';
                const s = orgSurveyData[person.name] || {};

                const row = [
                    `"${person.name}"`,
                    `"${person.title}"`,
                    `"${person.email}"`,
                    `"${person.location}"`,
                    `"${person.region}"`,
                    `"${person.role}"`,
                    comments,
                    stance,
                    score,
                    csmStatus,
                    `"${(s.q1||'').replace(/"/g,'""').replace(/\n/g,' ')}"`,
                    `"${(s.q2||'').replace(/"/g,'""').replace(/\n/g,' ')}"`,
                    `"${(s.q3||'').replace(/"/g,'""').replace(/\n/g,' ')}"`
                ].join(',');

                csv += row + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Premier_Truck_Group_Personnel_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>

    ptgLocations.forEach(loc => {
        const color = regionColors[loc.region];

            applyFilters();

    // Function to highlight the selected location marker
    function updateMarkerHighlight() {
        ptgMap.eachLayer(function(layer) {
            if (layer instanceof L.CircleMarker) {
                if (currentLocationFilter) {
                    // Find matching location
                    const matchingLoc = ptgLocations.find(loc => loc.name === currentLocationFilter);
                    if (matchingLoc && layer.getLatLng().lat === matchingLoc.lat && layer.getLatLng().lng === matchingLoc.lng) {
                        layer.setStyle({weight: 3, opacity: 1});
                    } else {
                        layer.setStyle({weight: 1.5, opacity: 0.5});
                    }
                } else {
                    layer.setStyle({weight: 1.5, opacity: 1});
                }
            }
        });
    }

        const div = L.DomUtil.create('div');
        div.style.cssText = 'background:#FFFFFF; padding:12px 16px; border-radius:8px; border:1px solid #E2E8F0; color:#1E293B; font-family:system-ui,sans-serif; font-size:12px;';
        div.innerHTML = '<div style="font-weight:700; font-size:14px; color:#F59E0B; margin-bottom:8px;">PREMIER TRUCK GROUP</div>' +
            '<div style="font-size:11px; color:#64748B; margin-bottom:10px;">US & CANADA OPERATIONS</div>' +
            '<div style="display:flex; gap:14px;">' +
            '<div style="color:#1E293B;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#06B6D4;margin-right:4px;"></span>East</div>' +
            '<div style="color:#1E293B;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#10B981;margin-right:4px;"></span>West</div>' +
            '<div style="color:#1E293B;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3B82F6;margin-right:4px;"></span>North</div>' +
            '</div>';
        return div;
    };
    legend.addTo(ptgMap);

    // Style the labels
    const labelStyle = document.createElement('style');
    labelStyle.textContent = '.ptg-label { background:rgba(255,255,255,0.95) !important; color:#1E293B !important; border:1px solid #E2E8F0 !important; border-radius:4px !important; padding:2px 6px !important; font-size:11px !important; font-weight:600 !important; font-family:system-ui,sans-serif !important; box-shadow:none !important; white-space:nowrap !important; } .ptg-label::before { border-right-color:rgba(255,255,255,0.95) !important; } .ptg-label-hidden { display:none !important; }';
    document.head.appendChild(labelStyle);

    // Hide overlapping labels based on zoom level
    function resolveOverlaps() {
        const tooltips = [];
        ptgMap.eachLayer(function(layer) {
            if (layer instanceof L.CircleMarker && layer.getTooltip()) {
                const tt = layer.getTooltip();
                const el = tt.getElement();
                if (el) {
                    el.classList.remove('ptg-label-hidden');
                    const rect = el.getBoundingClientRect();
                    tooltips.push({ el, rect, layer });
                }
            }
        });
        // Sort by longitude (left to right) so we keep a consistent set
        tooltips.sort((a, b) => a.layer.getLatLng().lng - b.layer.getLatLng().lng);
        const visible = [];
        tooltips.forEach(t => {
            const overlaps = visible.some(v => {
                return !(t.rect.right < v.rect.left || t.rect.left > v.rect.right ||
                         t.rect.bottom < v.rect.top || t.rect.top > v.rect.bottom);
            });
            if (overlaps) {
                t.el.classList.add('ptg-label-hidden');
            } else {
                visible.push(t);
            }
        });
    }

    ptgMap.on('zoomend moveend', resolveOverlaps);
    setTimeout(resolveOverlaps, 500);
    </script>
